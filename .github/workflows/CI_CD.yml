name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v3

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 빌드 (jar 파일 생성)
      - name: Build with Gradle
        working-directory: gunsilver/appcenter-todo-api
        run: ./gradlew bootJar

      # 4. Docker Hub 로그인
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. Docker 이미지 빌드 및 푸쉬
      - name: Build and Push Docker Image
        working-directory: gunsilver/appcenter-todo-api
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest

      # 6. 서버에 SSH 접속 후 배포
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.APPCENTER_SERVER_IP }}
          username: ${{ secrets.APPCENTER_SERVER_USERNAME }}
          password: ${{ secrets.APPCENTER_SERVER_PASSWORD }}
          port: ${{ secrets.APPCENTER_SERVER_PORT }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
            docker stop todo-api || true
            docker rm todo-api || true
            docker run -d \
              --name todo-api \
              -p 8018:8080 \
              -e MYSQL_URL=${{ secrets.MYSQL_URL }} \
              -e MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }} \
              -e MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
